services:
  mongodb:
    image: mongo:7
    container_name: addax-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: addax-calendar
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5"]
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
